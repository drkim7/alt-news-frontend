<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대체투자 뉴스 브리핑 · 외부망용</title>
<style>
  :root {
    --bg: #081120;
    --bg-soft: #0d172a;
    --panel: rgba(13, 23, 42, 0.88);
    --panel-strong: #101c33;
    --panel-alt: #13233f;
    --border: rgba(148, 163, 184, 0.18);
    --border-strong: rgba(148, 163, 184, 0.28);
    --accent: #7cc4ff;
    --accent-strong: #4aa3ff;
    --accent-soft: rgba(124, 196, 255, 0.14);
    --gold: #e7c56f;
    --success: #37c99a;
    --error: #ff7b7b;
    --text: #e8eef8;
    --text-soft: #b5c2d9;
    --text-mute: #7d8ca7;
    --tag-bg: rgba(255,255,255,0.05);
    --shadow: 0 18px 60px rgba(0,0,0,0.28);
    --radius: 14px;
    --radius-lg: 22px;
    --font-head: 'Inter', 'Pretendard', 'Segoe UI', sans-serif;
    --font-body: 'Pretendard', 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    --transition: 0.18s ease;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background:
      radial-gradient(circle at top left, rgba(74,163,255,0.14), transparent 30%),
      radial-gradient(circle at top right, rgba(55,201,154,0.12), transparent 28%),
      linear-gradient(180deg, #081120 0%, #0a1323 100%);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  a { color: inherit; }

  .header {
    background: rgba(8, 17, 32, 0.78);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left { display:flex; align-items:center; gap:14px; }
  .logo-mark {
    width: 34px; height: 34px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--gold) 100%);
    display:flex; align-items:center; justify-content:center;
    font-size: 13px; font-weight: 800; color: #07111f;
    box-shadow: 0 8px 22px rgba(124,196,255,0.24);
  }
  .logo-wrap { display:flex; flex-direction:column; gap:2px; }
  .logo-text { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
  .logo-sub { font-size: 11px; color: var(--text-mute); letter-spacing: 0.2px; }
  .header-right { display:flex; align-items:center; gap:12px; }
  .status-badge {
    display:flex; align-items:center; gap:7px; font-size:12px; color:var(--text-soft);
    background: rgba(255,255,255,0.03); border:1px solid var(--border);
    border-radius:999px; padding:6px 10px;
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--success);
    box-shadow: 0 0 10px var(--success); animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.45} }
  .btn-refresh {
    background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
    border: 1px solid var(--border);
    color: var(--text-soft);
    border-radius: 999px;
    padding: 8px 14px;
    font-size: 12px;
    cursor: pointer;
    transition: var(--transition);
    display:flex; align-items:center; gap:7px;
  }
  .btn-refresh:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
  .btn-refresh.loading svg { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .layout { display:flex; height: calc(100vh - 64px); }

  .sidebar {
    width: 252px;
    background: rgba(9, 18, 35, 0.78);
    backdrop-filter: blur(10px);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    flex-shrink: 0;
    padding: 18px 14px;
  }
  .sidebar::-webkit-scrollbar { width: 5px; }
  .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius:999px; }
  .sidebar-section { margin-bottom: 16px; }
  .sidebar-section-title {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.1px;
    color: var(--text-mute); padding: 4px 8px 10px;
  }
  .tab-btn {
    display:flex; align-items:center; justify-content:space-between; gap:10px; width:100%;
    padding: 12px 12px; margin-bottom: 6px; background: transparent; border:1px solid transparent;
    color: var(--text-soft); font-size: 13px; cursor:pointer; text-align:left; transition: var(--transition);
    border-radius: 14px;
  }
  .tab-btn:hover {
    background: rgba(255,255,255,0.04);
    border-color: rgba(255,255,255,0.06);
    color: var(--text);
  }
  .tab-btn.active {
    background: linear-gradient(135deg, rgba(124,196,255,0.16), rgba(231,197,111,0.08));
    border-color: rgba(124,196,255,0.24);
    color: var(--text);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
  }
  .tab-icon {
    width: 28px; height: 28px; border-radius: 9px; display:flex; align-items:center; justify-content:center;
    background: rgba(255,255,255,0.05); flex-shrink:0;
  }
  .tab-label { flex:1; line-height:1.35; }
  .tab-count {
    font-size: 11px; min-width: 30px; text-align:center; border-radius: 999px; padding: 2px 8px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.06); color: var(--text-mute);
  }
  .tab-btn.active .tab-count {
    background: rgba(124,196,255,0.14); border-color: rgba(124,196,255,0.18); color: var(--accent);
  }
  .sidebar-divider { height:1px; margin: 12px 8px; background: linear-gradient(90deg, transparent, var(--border), transparent); }

  .main { flex:1; overflow-y:auto; padding: 20px 22px 28px; }
  .main::-webkit-scrollbar { width: 8px; }
  .main::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 999px; }

  .content-shell { max-width: 1340px; margin: 0 auto; }
  .hero-panel {
    background: linear-gradient(135deg, rgba(18,34,61,0.92), rgba(12,24,44,0.92));
    border: 1px solid rgba(124,196,255,0.18);
    border-radius: var(--radius-lg);
    padding: 24px;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }
  .hero-panel::after {
    content:''; position:absolute; inset: auto -60px -60px auto; width:220px; height:220px;
    background: radial-gradient(circle, rgba(124,196,255,0.18), transparent 65%);
    pointer-events:none;
  }
  .hero-top { display:flex; justify-content:space-between; gap:18px; align-items:flex-start; }
  .hero-copy { max-width: 760px; }
  .eyebrow {
    display:inline-flex; align-items:center; gap:8px; padding: 6px 10px; border-radius:999px;
    border: 1px solid rgba(124,196,255,0.18); background: rgba(124,196,255,0.08);
    color: var(--accent); font-size: 11px; font-weight: 700; letter-spacing: 0.3px; text-transform: uppercase;
  }
  .content-title { margin-top: 12px; font-size: 30px; line-height:1.15; font-weight: 750; letter-spacing: -0.8px; }
  .content-subtitle { margin-top: 10px; font-size: 14px; color: var(--text-soft); max-width: 720px; }
  .hero-meta { display:flex; flex-wrap:wrap; gap:10px; margin-top: 16px; }
  .meta-pill {
    display:inline-flex; align-items:center; gap:6px; border-radius:999px; padding: 7px 11px;
    background: rgba(255,255,255,0.045); border:1px solid var(--border); color: var(--text-soft); font-size: 12px;
  }
  .hero-actions { display:flex; align-items:center; gap:10px; margin-top: 18px; }

  .metrics-grid {
    margin-top: 18px;
    display:grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 12px;
  }
  .metric-card {
    background: rgba(255,255,255,0.045);
    border: 1px solid var(--border);
    border-radius: 18px; padding: 14px 16px;
  }
  .metric-label { font-size: 11px; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.8px; }
  .metric-value { margin-top: 8px; font-size: 24px; font-weight: 760; letter-spacing: -0.5px; }
  .metric-note { margin-top: 4px; font-size: 12px; color: var(--text-soft); }

  .filter-bar {
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;
    margin-top: 18px; padding: 0 4px;
  }
  .filter-left, .filter-right { display:flex; align-items:center; gap: 10px; flex-wrap:wrap; }
  .filter-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.9px; color: var(--text-mute); }
  .filter-btn {
    background: rgba(255,255,255,0.04); border:1px solid var(--border); color: var(--text-soft);
    border-radius: 999px; padding: 7px 13px; font-size: 12px; cursor:pointer; transition: var(--transition);
  }
  .filter-btn:hover { border-color: rgba(124,196,255,0.24); color: var(--text); }
  .filter-btn.active {
    background: linear-gradient(135deg, rgba(124,196,255,0.18), rgba(124,196,255,0.08));
    border-color: rgba(124,196,255,0.24); color: var(--accent); font-weight: 700;
  }

  .inline-alert {
    margin-top: 16px; padding: 12px 14px; border-radius: 14px;
    background: rgba(255,123,123,0.08); border:1px solid rgba(255,123,123,0.16); color: #ffbab5; font-size: 12px;
  }

  .story-layout {
    display:grid; grid-template-columns: minmax(0, 1.25fr) minmax(320px, 0.75fr); gap: 16px; margin-top: 18px;
  }
  .lead-story {
    background: linear-gradient(180deg, rgba(19,35,63,0.92), rgba(12,25,46,0.92));
    border:1px solid var(--border-strong); border-radius: 22px; padding: 22px; position:relative; overflow:hidden;
    min-height: 280px;
  }
  .lead-story::before {
    content:''; position:absolute; inset:0 auto auto 0; width: 100%; height: 4px;
    background: linear-gradient(90deg, var(--accent), var(--gold));
  }
  .lead-kicker { display:flex; justify-content:space-between; gap:10px; align-items:center; }
  .lead-label {
    display:inline-flex; align-items:center; gap:8px; font-size: 11px; letter-spacing: 0.8px; text-transform: uppercase;
    color: var(--gold); font-weight:700;
  }
  .lead-title { margin-top: 16px; font-size: 28px; line-height: 1.24; font-weight: 760; letter-spacing: -0.9px; }
  .lead-desc { margin-top: 14px; font-size: 14px; color: var(--text-soft); max-width: 92%; }
  .lead-footer { margin-top: 18px; display:flex; flex-wrap:wrap; gap:12px; align-items:center; }

  .lead-side { display:grid; gap: 14px; }
  .signal-card, .source-card, .news-card, .settings-card, .state-box, .skeleton-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 18px;
    box-shadow: var(--shadow);
  }
  .signal-card, .source-card { padding: 18px; }
  .panel-title { font-size: 13px; font-weight: 700; letter-spacing: -0.2px; }
  .panel-sub { margin-top: 4px; font-size: 12px; color: var(--text-mute); }
  .signal-list { margin-top: 14px; display:grid; gap: 10px; }
  .signal-item {
    display:flex; align-items:flex-start; gap:10px; padding: 10px 12px; border-radius: 14px;
    background: rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.04);
  }
  .signal-rank {
    width: 24px; height: 24px; border-radius: 50%; background: rgba(124,196,255,0.12);
    display:flex; align-items:center; justify-content:center; font-size: 11px; color: var(--accent); font-weight:700; flex-shrink:0;
  }
  .signal-item a { text-decoration:none; font-size: 13px; color: var(--text); line-height:1.4; }
  .signal-item a:hover { color: var(--accent); }
  .signal-meta { margin-top: 4px; font-size: 11px; color: var(--text-mute); }

  .source-list { margin-top: 14px; display:grid; gap: 10px; }
  .source-row { display:flex; align-items:center; justify-content:space-between; gap: 12px; }
  .source-name { font-size: 13px; color: var(--text-soft); }
  .source-bar { flex:1; height: 6px; background: rgba(255,255,255,0.05); border-radius:999px; overflow:hidden; }
  .source-bar span { display:block; height:100%; background: linear-gradient(90deg, var(--accent), var(--gold)); border-radius:999px; min-width: 4px; }
  .source-count { font-size: 12px; color: var(--text); min-width: 28px; text-align:right; }

  .section-header {
    margin-top: 22px; padding: 0 4px; display:flex; align-items:end; justify-content:space-between; gap:12px;
  }
  .section-title { font-size: 20px; font-weight: 730; letter-spacing: -0.4px; }
  .section-desc { margin-top: 4px; font-size: 12px; color: var(--text-mute); }

  .news-grid {
    display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; margin-top: 14px;
  }
  .news-card {
    padding: 18px; transition: var(--transition); position:relative; overflow:hidden; min-height: 220px;
    display:flex; flex-direction:column; gap:12px;
    background: linear-gradient(180deg, rgba(14,24,43,0.92), rgba(10,19,34,0.94));
  }
  .news-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height: 3px;
    background: linear-gradient(90deg, transparent, rgba(124,196,255,0.8), transparent);
    opacity: 0; transition: var(--transition);
  }
  .news-card:hover { transform: translateY(-3px); border-color: rgba(124,196,255,0.26); }
  .news-card:hover::before { opacity: 1; }
  .news-card.featured-small { min-height: 240px; }
  .card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
  .card-source-row { display:flex; align-items:center; gap:7px; flex-wrap:wrap; }
  .source-badge {
    font-size: 10px; font-weight: 700; letter-spacing: 0.4px; text-transform: uppercase; color: var(--accent);
    background: rgba(124,196,255,0.1); border:1px solid rgba(124,196,255,0.16); border-radius: 999px; padding: 3px 8px;
  }
  /* ── 키워드 편집 인풋 ── */
  .kw-edit-input {
    width: 100%;
    background: var(--bg-main, #0f1117);
    border: 1px solid var(--border, #2a2d36);
    border-radius: 6px;
    color: var(--text-main, #e8eaf0);
    font-size: 12px;
    padding: 6px 10px;
    margin-top: 4px;
    box-sizing: border-box;
    font-family: inherit;
    transition: border-color .15s;
  }
  .kw-edit-input:focus {
    outline: none;
    border-color: var(--accent, #6c8ef5);
  }
  .kw-edit-row {
    display: grid;
    gap: 10px;
    margin-top: 6px;
  }
  .kw-edit-label {
    font-size: 11px;
    color: var(--text-mute, #8b8fa8);
    margin-bottom: 2px;
  }
  .kw-section-hint {
    font-size: 11px;
    color: var(--text-mute, #8b8fa8);
    margin-bottom: 10px;
    line-height: 1.5;
  }
  .keyword-tag {
    font-size: 10px; color: var(--text-soft); background: var(--tag-bg); border:1px solid rgba(255,255,255,0.05);
    border-radius: 999px; padding: 3px 8px;
  }
  .card-time { font-size: 11px; color: var(--text-mute); white-space:nowrap; }
  .card-time.fresh { color: var(--success); }
  .card-time.today { color: var(--gold); }
  .card-title { font-size: 16px; font-weight: 700; line-height: 1.45; letter-spacing: -0.3px; }
  .card-title a { text-decoration:none; }
  .card-title a:hover { color: var(--accent); }
  .card-desc {
    font-size: 13px; color: var(--text-soft); line-height: 1.65;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card-footer { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:auto; }
  .card-link {
    display:inline-flex; align-items:center; gap:6px; text-decoration:none; font-size: 12px; color: var(--text-soft);
  }
  .card-link:hover { color: var(--accent); }
  .btn-bookmark {
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); cursor:pointer;
    padding: 7px; border-radius: 12px; transition: var(--transition); color: var(--text-mute);
    display:flex; align-items:center; justify-content:center;
  }
  .btn-bookmark:hover, .btn-bookmark.bookmarked { color: var(--gold); border-color: rgba(231,197,111,0.2); }
  .btn-bookmark svg { width: 14px; height: 14px; }

  .state-box {
    padding: 52px 24px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; margin-top: 18px;
  }
  .state-icon { font-size: 42px; opacity: 0.7; }
  .state-title { font-size: 18px; font-weight: 700; }
  .state-desc { font-size: 13px; color: var(--text-soft); text-align:center; line-height:1.7; }

  .skeleton-grid {
    display:grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 14px; margin-top: 18px;
  }
  .skeleton-card { padding: 18px; }
  .sk-line {
    height: 12px; border-radius: 999px; background: linear-gradient(90deg, rgba(255,255,255,0.05), rgba(255,255,255,0.11), rgba(255,255,255,0.05));
    background-size: 400% 100%; animation: shimmer 1.5s ease-in-out infinite;
  }
  @keyframes shimmer { 0%{background-position:100% 0} 100%{background-position:-100% 0} }

  .settings-panel { max-width: 980px; margin: 0 auto; display:grid; gap: 16px; }
  .settings-hero { padding: 24px; border-radius: 22px; background: linear-gradient(135deg, rgba(18,34,61,0.92), rgba(12,24,44,0.92)); border:1px solid rgba(124,196,255,0.18); box-shadow: var(--shadow); }
  .settings-title { font-size: 28px; font-weight: 760; letter-spacing:-0.7px; }
  .settings-intro { margin-top: 10px; font-size: 14px; color: var(--text-soft); max-width: 740px; }
  .settings-grid { display:grid; grid-template-columns: 1.15fr 0.85fr; gap: 16px; }
  .settings-card { padding: 20px; }
  .settings-section-label { font-size: 12px; font-weight: 700; color: var(--text-mute); text-transform: uppercase; letter-spacing: 1px; }
  .settings-row {
    display:flex; align-items:center; justify-content:space-between; gap:12px; padding: 12px 14px; margin-top: 10px;
    background: rgba(255,255,255,0.035); border:1px solid var(--border); border-radius: 14px; color: var(--text-soft);
  }
  .settings-row.stack { flex-direction:column; align-items:stretch; }
  .proxy-input {
    width:100%; background: rgba(255,255,255,0.04); border:1px solid var(--border); border-radius: 14px; padding: 12px 14px;
    color: var(--text); font-size: 13px; outline:none; transition: var(--transition);
  }
  .proxy-input:focus { border-color: rgba(124,196,255,0.32); box-shadow: 0 0 0 3px rgba(124,196,255,0.08); }
  .proxy-input::placeholder { color: var(--text-mute); }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-strong)); color: #04101d; border:none; border-radius: 999px;
    padding: 11px 18px; font-size: 13px; font-weight: 800; cursor:pointer; transition: var(--transition);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 10px 24px rgba(74,163,255,0.26); }
  .btn-danger { background: linear-gradient(135deg, #ff8b8b, #ff6363); color: white; }
  .info-box {
    margin-top: 12px; background: rgba(124,196,255,0.08); border:1px solid rgba(124,196,255,0.14); border-radius: 16px; padding: 14px;
    font-size: 13px; color: var(--text-soft); line-height:1.75;
  }
  .info-box strong { color: var(--accent); }
  .rss-help { font-size: 12px; color: var(--text-mute); line-height: 1.7; margin-top: 10px; }
  .rss-help code, .info-box code {
    background: rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.06); border-radius: 8px; padding: 2px 6px; color: var(--gold);
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 11px;
  }
  .mode-selector { display:grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 10px; margin-top: 14px; }
  .mode-card {
    padding: 14px; border-radius: 16px; border:1px solid var(--border); background: rgba(255,255,255,0.035); cursor:pointer; transition: var(--transition);
  }
  .mode-card:hover { border-color: rgba(124,196,255,0.24); transform: translateY(-1px); }
  .mode-card.active { background: rgba(124,196,255,0.1); border-color: rgba(124,196,255,0.28); }
  .mode-card-title { font-size: 13px; font-weight: 700; }
  .mode-card-desc { margin-top: 4px; font-size: 12px; color: var(--text-mute); line-height:1.55; }
  .radio-btn {
    width: 16px; height: 16px; border-radius: 50%; border:1px solid rgba(255,255,255,0.25); display:inline-block; position:relative; flex-shrink:0;
  }
  .radio-btn.on { border-color: var(--accent); }
  .radio-btn.on::after { content:''; position:absolute; inset:3px; border-radius:50%; background: var(--accent); }

  .scroll-top {
    position: fixed; bottom: 24px; right: 24px; width: 40px; height: 40px; border-radius: 50%;
    background: rgba(8,17,32,0.92); border: 1px solid var(--border); color: var(--text-soft);
    display:flex; align-items:center; justify-content:center; cursor:pointer; transition: var(--transition);
    opacity:0; pointer-events:none; z-index: 60; box-shadow: var(--shadow);
  }
  .scroll-top.visible { opacity: 1; pointer-events:auto; }
  .scroll-top:hover { color: var(--accent); border-color: var(--accent); }

  @media (max-width: 1200px) {
    .story-layout, .settings-grid { grid-template-columns: 1fr; }

function loadStorage() {
  try {
    const bm = localStorage.getItem('ai_bm');
    if (bm) STATE.bookmarks = JSON.parse(bm);

    const cfg = localStorage.getItem('ai_cfg');
    if (cfg) {
      const c = JSON.parse(cfg);

      const isGithubPages = location.hostname.endsWith('github.io');
      const savedApi = c.apiBaseUrl;
      const savedMode = c.mode;

      if (c.jsonBaseUrl !== undefined) STATE.jsonBaseUrl = c.jsonBaseUrl;

      if (c.tabKeywords) {
        Object.entries(c.tabKeywords).forEach(([id, kws]) => {
          if (TAB_CONFIG[id] && Array.isArray(kws) && kws.length > 0) {
            TAB_CONFIG[id].keywords = kws;
          }
        });
      }

      if (isGithubPages) {
        STATE.apiBaseUrl = 'https://alt-news-backend.onrender.com';
        STATE.mode = 'api';
        saveConfig();
      } else {
        if (savedApi !== undefined) STATE.apiBaseUrl = savedApi;
        if (savedMode !== undefined) STATE.mode = savedMode;
      }
    } else if (location.hostname.endsWith('github.io')) {
      STATE.apiBaseUrl = 'https://alt-news-backend.onrender.com';
      STATE.mode = 'api';
      saveConfig();
    }
  } catch(e) {}
  updateBookmarkCount();
}

function saveConfig() {
  try {
    const tabKeywords = {};
    Object.entries(TAB_CONFIG).forEach(([id, cfg]) => { tabKeywords[id] = cfg.keywords; });
    localStorage.setItem('ai_cfg', JSON.stringify({
      apiBaseUrl: STATE.apiBaseUrl,
      jsonBaseUrl: STATE.jsonBaseUrl,
      mode: STATE.mode,
      tabKeywords,
    }));
  } catch(e) {}
}

function normalizeItem(item, fallbackKeyword = '') {
  const link = item.link || item.url || '#';
  const pubDateRaw = item.pubDate || item.publishedAt || item.date || new Date().toISOString();
  const pubDate = new Date(pubDateRaw);
  return {
    title: item.title || '(제목 없음)',
    link,
    desc: item.desc || item.description || '',
    source: item.source || item.publisher || extractDomain(link) || 'unknown',
    keyword: item.keyword || fallbackKeyword || '',
    pubDate,
    id: item.id || makeId(link + '|' + (item.title || '')),
  };
}

const OPPORTUNITY = ['투자확대','투자 확대','펀드조성','펀드 조성','인수','자금조달','신규투자','신규 투자','수익률'];

function calcRisk(item) {
  const text = (item.title + ' ' + (item.desc || '')).toLowerCase();
  const tags = [];
  let score = 0;

  if (RISK_RULES.high.some(k => text.includes(k.toLowerCase()))) { tags.push('high'); score += 3; }
  if (RISK_RULES.medium.some(k => text.includes(k.toLowerCase()))) { tags.push('medium'); score += 2; }
  if (RISK_RULES.policy.some(k => text.includes(k.toLowerCase()))) { tags.push('policy'); score += 2; }
  if (OPPORTUNITY.some(k => text.includes(k.toLowerCase()))) tags.push('opportunity');

  // 최근 24시간 +1
  if (item.pubDate && (Date.now() - item.pubDate) < 86400000) score += 1;

  const riskLevel = score >= 7 ? 'high' : score >= 4 ? 'medium' : score >= 1 ? 'low' : 'normal';
  return { riskTags: tags, riskLevel, priorityScore: Math.min(score, 10) };
}

function enrichItems(items) {
  return items.map(item => {
    const risk = calcRisk(item);
    return { ...item, ...risk };
  });
}

function sortItems(items, sort) {
  if (sort === 'priority') {
    return [...items].sort((a, b) => {
      const pd = (b.priorityScore || 0) - (a.priorityScore || 0);
      if (pd !== 0) return pd;
      return b.pubDate - a.pubDate;
    });
  }
  return [...items].sort((a, b) => b.pubDate - a.pubDate);
}

function isNewArticle(tabId, item) {
  const lastSeen = STATE.lastSeenAt[tabId];
  if (!lastSeen || !item.pubDate) return false;
  return item.pubDate.getTime() > lastSeen;
}

function buildRiskBadges(item) {
  const tags = item.riskTags || [];
  const badges = [];
  if (tags.includes('high'))   badges.push('<span class="risk-badge risk-high">⚠ 고위험</span>');
  if (tags.includes('medium')) badges.push('<span class="risk-badge risk-medium">△ 주의</span>');
  if (tags.includes('policy')) badges.push('<span class="risk-badge risk-policy">📋 정책</span>');
  return badges.join(' ');
}

function markLastSeen(tabId, items) {
  if (!items.length) return;
  const latest = Math.max(...items.map(i => i.pubDate?.getTime?.() || 0));
  STATE.lastSeenAt[tabId] = latest;
  try { localStorage.setItem('ai_lastseen', JSON.stringify(STATE.lastSeenAt)); } catch(e) {}
}

function loadLastSeen() {
  try {
    const v = localStorage.getItem('ai_lastseen');
    if (v) STATE.lastSeenAt = JSON.parse(v);
  } catch(e) {}
}

function generateBriefing(articles) {
  const now = new Date();
  const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  let text = `[대체투자 뉴스 브리핑] ${dateStr}\n`;
  text += '─'.repeat(40) + '\n\n';
  articles.forEach((item, i) => {
    const risk = item.riskLevel === 'high' ? ' 🔴 고위험' : item.riskLevel === 'medium' ? ' 🟠 주의' : item.riskTags?.includes('policy') ? ' 🔵 정책' : '';
    text += `${i + 1}. ${item.title}${risk}\n`;
    text += `   매체: ${item.source || '불명'} · 키워드: ${item.keyword || '—'}\n`;
    if (item.desc) text += `   요약: ${item.desc.slice(0, 80)}${item.desc.length > 80 ? '…' : ''}\n`;
    text += `   링크: ${item.link}\n\n`;
  });
  text += '─'.repeat(40) + '\n';
  text += `총 ${articles.length}건 선택 · 생성: ${now.toLocaleTimeString('ko-KR')}`;
  return text;
}

function makeId(seed) {
  try {
    return btoa(unescape(encodeURIComponent(seed))).replace(/=/g, '').substring(0, 24);
  } catch(e) {
    return 'id-' + Math.random().toString(36).slice(2, 12);
  }
}

function withTimeout(promise, ms) {
  return Promise.race([
    promise,
    new Promise((_, reject) => setTimeout(() => reject(new Error('요청 시간 초과')), ms))
  ]);
}

async function fetchJson(url) {
  const res = await withTimeout(fetch(url, { cache: 'no-cache' }), APP_CONFIG.requestTimeoutMs);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function fetchFromApi(tabId) {
  const cfg = TAB_CONFIG[tabId];
  const base = (STATE.apiBaseUrl || APP_CONFIG.apiBaseUrl || '').replace(/\/$/, '');
  const path = APP_CONFIG.apiPath.startsWith('/') ? APP_CONFIG.apiPath : '/' + APP_CONFIG.apiPath;
  const url = `${base}${path}?tab=${encodeURIComponent(tabId)}&maxItems=${cfg.maxItems}&hoursBack=${cfg.hoursBack}&keywords=${encodeURIComponent(cfg.keywords.join(','))}`;
  const data = await fetchJson(url);
  const list = Array.isArray(data) ? data : (data.items || data.news || []);
  return list.map(i => normalizeItem(i)).sort((a,b) => b.pubDate - a.pubDate);
}

// ── RSS 모드: 서버 없이 브라우저에서 직접 Google News RSS 수집
// 단일 키워드에 대해 프록시 목록을 순서대로 시도
// 단일 프록시 시도 → 성공 시 파싱된 아이템 배열 반환, 실패 시 throw
async function tryProxy(proxy, rssUrl, perKw) {
  const proxyUrl = proxy + encodeURIComponent(rssUrl);
  const res = await withTimeout(fetch(proxyUrl, { cache: 'no-cache' }), APP_CONFIG.requestTimeoutMs);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const text = await res.text();
  const parser = new DOMParser();
  const xml = parser.parseFromString(text, 'application/xml');
  if (xml.querySelector('parsererror')) throw new Error('XML parse error');
  const items = Array.from(xml.querySelectorAll('item')).slice(0, perKw);
  if (items.length === 0) throw new Error('empty feed');
  const results = [];
  items.forEach(el => {
    const title = el.querySelector('title')?.textContent?.trim() || '';
    const link  = el.querySelector('link')?.textContent?.trim() || '';
    const desc  = (el.querySelector('description')?.textContent || '').replace(/<[^>]*>/g, '').slice(0, 280);
    const pub   = el.querySelector('pubDate')?.textContent?.trim() || '';
    const src   = el.querySelector('source')?.textContent?.trim() || 'Google News';
    if (title && link) results.push({ title, link, desc, source: src, keyword: kw, pubDate: pub, id: makeId(link) });
  });
  return results;
}

// 모든 프록시를 병렬로 동시에 시도 → 제일 먼저 성공한 결과 사용 (Promise.any)
async function fetchRssForKeyword(kw, perKw) {
  const rssUrl = APP_CONFIG.googleNewsRss.replace('{query}', encodeURIComponent(kw));
  const proxies = APP_CONFIG.corsProxies;
  try {
    const result = await Promise.any(proxies.map(proxy => tryProxy(proxy, rssUrl, perKw)));
    console.info('RSS OK [' + kw + ']');
    return result;
  } catch(aggErr) {
    // AggregateError: 모든 프록시 실패
    console.error('All proxies failed for: ' + kw);
    return [];
  }
}

async function fetchFromRss(tabId) {
  const cfg = TAB_CONFIG[tabId];
  const keywords = cfg.keywords;
  const hoursBack = cfg.hoursBack;
  const maxItems = cfg.maxItems;
  const perKw = Math.max(1, Math.ceil(maxItems / keywords.length));

  const results = await Promise.allSettled(keywords.map(kw => fetchRssForKeyword(kw, perKw)));

  const seenLinks = new Set();
  const allItems = [];
  results.forEach(r => {
    if (r.status === 'fulfilled') {
      r.value.forEach(item => {
        if (!seenLinks.has(item.link)) {
          seenLinks.add(item.link);
          allItems.push(normalizeItem(item));
        }
      });
    }
  });

  const cutoff = Date.now() - hoursBack * 3600 * 1000;
  const filtered = allItems
    .filter(i => i.pubDate && i.pubDate.getTime() > cutoff)
    .sort((a, b) => b.pubDate - a.pubDate)
    .slice(0, maxItems * 2);

  // 0건이면 fetch 자체는 됐지만 결과 없음 vs 완전 실패를 구분해서 throw
  if (filtered.length === 0 && allItems.length === 0) {
    throw new Error('RSS_ALL_FAILED: 모든 CORS 프록시가 응답하지 않습니다. 인터넷 연결을 확인하거나 설정에서 API 모드로 변경하세요.');
  }
  return filtered;
}

async function fetchFromJson(tabId) {
  const base = (STATE.jsonBaseUrl || APP_CONFIG.jsonBaseUrl || './data').replace(/\/$/, '');
  const url = `${base}/${encodeURIComponent(tabId)}.json`;
  const data = await fetchJson(url);
  const list = Array.isArray(data) ? data : (data.items || data.news || []);
  return list.map(i => normalizeItem(i)).sort((a,b) => b.pubDate - a.pubDate);
}

function fetchDemoData(tabId) {
  return (SAMPLE_DATA[tabId] || []).map(i => normalizeItem(i));
}

async function fetchTabData(tabId) {
  setStatus('불러오는 중…', true);

  let items = [];
  if (STATE.mode === 'demo') {
    items = fetchDemoData(tabId);
    setStatus('데모 데이터 표시', false);
    return { items, errorMessage: '', modeUsed: 'demo' };
  }

  try {
    items = STATE.mode === 'json' ? await fetchFromJson(tabId) : await fetchFromApi(tabId);
    setStatus(`${items.length}건 불러옴`, false);
    return { items, errorMessage: '', modeUsed: STATE.mode };
  } catch (e) {
    if (APP_CONFIG.fallbackToDemoOnError) {
      items = fetchDemoData(tabId);
      setStatus('실데이터 연결 실패 · 데모 표시', false);
      return { items, errorMessage: e.message || '연결 실패', modeUsed: 'demo' };
    }
    throw e;
  }
}

  const safeSrc   = escHtml(item.source || 'unknown');

  const itemJson  = escHtml(JSON.stringify({ id: item.id, title: item.title, link: item.link, source: item.source, pubDate: item.pubDate?.toISOString?.() || '', desc: item.desc, keyword: item.keyword, riskLevel: item.riskLevel, riskTags: item.riskTags }));
  const riskBadges = buildRiskBadges(item);
  const isNew = isNewArticle(STATE.currentTab, item);
  const isSelected = STATE.selectedArticles.some(a => a.id === item.id);

  return `
    <div class="news-card ${featured ? 'featured-small' : ''} ${item.riskLevel === 'high' ? 'risk-card-high' : ''}" id="card-${item.id}">
      <div class="card-select-wrap">
        <input type="checkbox" class="card-select" ${isSelected ? 'checked' : ''} onchange='toggleSelect(${itemJson}, this.checked)' title="브리핑 선택">
        <div style="flex:1;min-width:0">
          <div class="card-top">
            <div class="card-source-row">
              <span class="source-badge">${safeSrc}</span>
              <span class="keyword-tag">${safeKw}</span>
              ${riskBadges}
              ${isNew ? '<span class="new-badge">NEW</span>' : ''}
            </div>
            <span class="card-time ${rel.timeCls}">${rel.timeStr || formatAbsoluteDate(item.pubDate)}</span>
          </div>
          <div class="card-title"><a href="${safeLink}" target="_blank" rel="noopener">${safeTitle}</a></div>
          <div class="card-desc">${safeDesc}</div>
          <div class="card-footer">
            <a href="${safeLink}" target="_blank" rel="noopener" class="card-link">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
              원문 보기
            </a>
            <button class="btn-bookmark ${bmCls}" onclick='toggleBookmark(${itemJson})' title="북마크">
              <svg viewBox="0 0 24 24" fill="${bm?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>`;
}

function buildRelativeTime(item) {
  const ageMs = Date.now() - item.pubDate;
  const ageH = ageMs / 3600000;
  let timeCls = '', timeStr = '';
  if (!item.pubDate || isNaN(item.pubDate)) return { timeCls, timeStr };
  if (ageH < 1) { timeCls = 'fresh'; timeStr = `${Math.max(1, Math.round(ageMs / 60000))}분 전`; }
  else if (ageH < 6) { timeCls = 'fresh'; timeStr = `${Math.floor(ageH)}시간 전`; }
  else if (ageH < 24) { timeCls = 'today'; timeStr = `${Math.floor(ageH)}시간 전`; }
  else { timeStr = `${Math.floor(ageH / 24)}일 전`; }
  return { timeCls, timeStr };
}

function countRecent(items, hours) {
  const now = Date.now();
  return items.filter(item => item.pubDate && !isNaN(item.pubDate) && (now - item.pubDate) < hours * 3600000).length;
}

function summarizeSources(items) {
  if (!items.length) return [];
  const counts = new Map();
  items.forEach(item => {
    const name = item.source || 'unknown';
    counts.set(name, (counts.get(name) || 0) + 1);
  });
  const total = items.length;
  return [...counts.entries()]
    .sort((a,b) => b[1] - a[1])
    .map(([name, count]) => ({ name, count, ratio: Math.round(count / total * 100) }));
}

function formatAbsoluteDate(date) {
  if (!date || isNaN(date)) return '시각 정보 없음';
  const yyyy = date.getFullYear();
  const mm = String(date.getMonth() + 1).padStart(2, '0');
  const dd = String(date.getDate()).padStart(2, '0');
  const hh = String(date.getHours()).padStart(2, '0');
  const mi = String(date.getMinutes()).padStart(2, '0');
  return `${yyyy}-${mm}-${dd} ${hh}:${mi}`;
}

function buildModeCard(mode, title, desc) {
  return `<div class="mode-card ${STATE.mode===mode?'active':''}" onclick="setMode('${mode}')">

    </div>
    <div class="mode-card-desc">${desc}</div>
  </div>`;
}

// ============================================================
// ACTIONS
// ============================================================
function escHtml(s) {
  if (typeof s !== 'string') return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function switchTab(btn, tabId) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  STATE.currentTab = tabId;
  STATE.filter = 'all';

  if (tabId === 'bookmarks') { renderBookmarks(); return; }
  if (tabId === 'settings')  { renderSettings();  return; }

  if (STATE.cache[tabId]) {
    renderNews(tabId, STATE.cache[tabId].items);
  } else {
    fetchCurrentTab();
  }
}

async function fetchCurrentTab() {
  const tabId = STATE.currentTab;
  if (tabId === 'bookmarks' || tabId === 'settings') return;

  const btn = document.getElementById('btnRefresh');
  btn.classList.add('loading');
  renderSkeleton();

  try {
    const result = await fetchTabData(tabId);
    STATE.cache[tabId] = {
      items: result.items,
      fetchedAt: new Date(),
      errorMessage: result.errorMessage || '',
      modeUsed: result.modeUsed || STATE.mode
    };
    renderNews(tabId, result.items);
  } catch(e) {
    mainArea.innerHTML = `<div class="state-box">
      <div class="state-icon">⚠️</div>
      <div class="state-title">불러오기 실패</div>
      <div class="state-desc">API/JSON 서버에 접근할 수 없습니다.<br>설정 탭에서 서버 주소와 연결 방식을 확인하세요.<br><br><small style="color:var(--text-mute)">${escHtml(e.message)}</small><br><br><small style="color:var(--text-mute)">Render 무료 플랜은 첫 요청 시 30~60초 정도 걸릴 수 있습니다. 잠시 후 새로고침해 보세요.</small></div>
    </div>`;
    setStatus('불러오기 실패', false);
  } finally {
    btn.classList.remove('loading');
  }
}


function setFilter(f) {
  STATE.filter = f;
  const tabId = STATE.currentTab;
  if (STATE.cache[tabId]) renderNews(tabId, STATE.cache[tabId].items);
}

function toggleBookmark(item) {
  const idx = STATE.bookmarks.findIndex(b => b.id === item.id);
  if (idx >= 0) {
    STATE.bookmarks.splice(idx, 1);
  } else {
    STATE.bookmarks.unshift(item);
  }
  saveBookmarks();

  const card = document.getElementById(`card-${item.id}`);
  if (card) {
    const btn = card.querySelector('.btn-bookmark');
    const bm = STATE.bookmarks.find(b => b.id === item.id);
    btn.classList.toggle('bookmarked', !!bm);
    btn.querySelector('svg').setAttribute('fill', bm ? 'currentColor' : 'none');
  }
  if (STATE.currentTab === 'bookmarks') renderBookmarks();
}

function updateBookmarkCount() {
  document.getElementById('cnt-bookmarks').textContent = STATE.bookmarks.length;
}

function clearBookmarks() {
  if (confirm('북마크를 모두 삭제하시겠습니까?')) {
    STATE.bookmarks = [];
    saveBookmarks();
    if (STATE.currentTab === 'bookmarks') renderBookmarks();
  }
}

function setMode(mode) {
  if (location.hostname.endsWith('github.io') && mode === 'rss') {
    mode = 'api';
  }
  STATE.mode = mode;
  saveConfig();
  resetCache();
  renderSettings();
  if (STATE.currentTab !== 'settings' && STATE.currentTab !== 'bookmarks') {
    fetchCurrentTab();
  }
}


function setSort(sort) {
  STATE.sort = sort;
  const tabId = STATE.currentTab;
  if (STATE.cache[tabId]) renderNews(tabId, STATE.cache[tabId].items);
}

function toggleSelect(item, checked) {
  if (checked) {
    if (!STATE.selectedArticles.some(a => a.id === item.id)) STATE.selectedArticles.push(item);
  } else {
    STATE.selectedArticles = STATE.selectedArticles.filter(a => a.id !== item.id);
  }
  updateBriefingBar();
}

function clearSelection() {
  STATE.selectedArticles = [];
  updateBriefingBar();
  document.querySelectorAll('.card-select').forEach(cb => cb.checked = false);
}

function updateBriefingBar() {
  const bar = document.getElementById('briefingBar');
  const cnt = document.getElementById('selCount');
  if (!bar || !cnt) return;
  const n = STATE.selectedArticles.length;
  cnt.textContent = n;
  bar.classList.toggle('hidden', n === 0);
}

function openBriefing() {
  if (!STATE.selectedArticles.length) return;
  const text = generateBriefing(STATE.selectedArticles);
  document.getElementById('briefingText').textContent = text;
  document.getElementById('briefingModal').classList.remove('hidden');
}

function closeBriefing() {
  document.getElementById('briefingModal').classList.add('hidden');
}

function copyBriefing() {
  const text = document.getElementById('briefingText').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.btn-copy');
    const orig = btn.textContent;
    btn.textContent = '✓ 복사됨';
    setTimeout(() => btn.textContent = orig, 2000);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  });
}

function resetCache() {
  Object.keys(STATE.cache).forEach(k => delete STATE.cache[k]);
}

function saveConnectionConfig() {
  const apiInput = document.getElementById('apiBaseInput');
  const jsonInput = document.getElementById('jsonBaseInput');
  if (apiInput) STATE.apiBaseUrl = apiInput.value.trim();
  if (jsonInput) STATE.jsonBaseUrl = jsonInput.value.trim() || './data';
  // 키워드 인풋에서 TAB_CONFIG 업데이트
  Object.keys(TAB_CONFIG).forEach(id => {
    const inp = document.getElementById('kw_' + id);
    if (inp) {
      const kws = inp.value.split(',').map(s => s.trim()).filter(Boolean);
      if (kws.length > 0) TAB_CONFIG[id].keywords = kws;
    }
  });
  saveConfig();
  resetCache();
  alert('저장되었습니다. 현재 탭을 새로고침하면 반영됩니다.');
}

function setStatus(msg, loading) {
  document.getElementById('statusText').textContent = msg;
  const dot = document.getElementById('statusDot');
  dot.style.background = loading ? 'var(--accent)' : 'var(--success)';
  dot.style.boxShadow  = loading ? '0 0 6px var(--accent)' : '0 0 6px var(--success)';
}

function formatTime(date) {
  if (!date) return '—';
  const h = String(date.getHours()).padStart(2,'0');
  const m = String(date.getMinutes()).padStart(2,'0');
  const mon = date.getMonth()+1;
  const d = date.getDate();
  return `${mon}/${d} ${h}:${m}`;
}

function extractDomain(url) {
  try { return new URL(url).hostname.replace('www.',''); } catch(e) { return ''; }
}

function startAutoRefresh() {
  if (STATE.autoRefreshTimer) clearInterval(STATE.autoRefreshTimer);
  const mins = APP_CONFIG.autoRefreshMin;
  if (!mins) return;
  STATE.autoRefreshTimer = setInterval(() => {
    if (STATE.currentTab !== 'bookmarks' && STATE.currentTab !== 'settings') {
      fetchCurrentTab();
    }
  }, mins * 60 * 1000);
}

document.getElementById('mainArea').addEventListener('scroll', function() {
  const btn = document.getElementById('scrollTop');
  btn.classList.toggle('visible', this.scrollTop > 300);
});

(function init() {
  loadStorage();
  loadLastSeen();
  fetchCurrentTab();
  startAutoRefresh();
})();
</script>
